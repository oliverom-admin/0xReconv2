# =============================================================================
# 0xRecon — nginx LOCAL DEVELOPMENT REFERENCE
# =============================================================================
# THIS FILE IS NOT USED BY DOCKER COMPOSE.
# nginx runs as a host process in production (installed via apt).
# The production nginx config is generated by the install script.
#
# This file is retained as a reference for the routing rules and mTLS
# configuration that the production install script implements.
#
# For local development: hit the API directly on http://localhost:8000
# and the UI on http://localhost:3000. The nginx container has been removed.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    upstream recon_api {
        server recon-api:8000;
        keepalive 32;
    }

    upstream recon_ui {
        server recon-ui:80;
        keepalive 16;
    }

    # HTTPS — dashboard and API (port 443)
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/dev.crt;
        ssl_certificate_key /etc/nginx/certs/dev.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50m;

        location /api/ {
            proxy_pass         http://recon_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";
            proxy_read_timeout 300;
        }

        location /openapi.json {
            proxy_pass http://recon_api;
        }

        location / {
            proxy_pass         http://recon_ui;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://recon_ui;
        }
    }

    # Collector API — mTLS stub (port 8443)
    # Phase 1: TLS only. Phase 2 enables mTLS client cert verification.
    server {
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/dev.crt;
        ssl_certificate_key /etc/nginx/certs/dev.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Phase 2: uncomment to enforce mTLS
        # ssl_client_certificate /etc/nginx/certs/engagement-ca.crt;
        # ssl_verify_client on;

        location /api/v1/collector/ {
            proxy_pass         http://recon_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location / { return 404; }
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }
}
