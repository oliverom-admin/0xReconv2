[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recon-core"
version = "1.0.0"
description = "0xRecon shared core library"
requires-python = ">=3.11"
dependencies = [
    "pydantic==2.10.3",
    "cryptography==43.0.3",
    "structlog==24.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["recon_core"]
