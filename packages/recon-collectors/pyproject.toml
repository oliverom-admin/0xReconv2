[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recon-collectors"
version = "1.0.0"
description = "0xRecon discovery collectors"
requires-python = ">=3.11"
dependencies = [
    "pydantic==2.10.3",
    "httpx==0.28.1",
    "cryptography==43.0.3",
    "pyOpenSSL==24.3.0",
    "structlog==24.4.0",
    "recon-core",
]

[tool.hatch.build.targets.wheel]
packages = ["recon_collectors"]
