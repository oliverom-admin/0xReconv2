[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recon-agent"
version = "1.0.0"
description = "0xRecon remote collector agent"
requires-python = ">=3.11"
dependencies = [
    "httpx==0.28.1",
    "cryptography==43.0.3",
    "structlog==24.4.0",
    "recon-collectors",
    "recon-core",
]

[tool.hatch.build.targets.wheel]
packages = ["recon_agent"]
